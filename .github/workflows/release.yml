name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish single-file executable
        run: >
          dotnet publish -c Release -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish

      - name: Set release tag
        if: github.event_name != 'pull_request'
        id: version
        shell: pwsh
        run: |
          if ("${{ github.ref }}" -like "refs/tags/*") {
            echo "tag=${{ github.ref_name }}" >> $env:GITHUB_OUTPUT
          } else {
            echo "tag=build-${{ github.run_number }}" >> $env:GITHUB_OUTPUT
          }

      - name: Create GitHub Release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: NetScan ${{ steps.version.outputs.tag }}
          body: |
            ## NetScan ${{ steps.version.outputs.tag }}

            Self-contained single-file Windows executable — no installation required.

            ### Usage
            Download `NetScan.exe` and run it directly on Windows 10/11.
          files: publish/NetScan.exe
