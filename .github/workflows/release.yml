name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish single-file executable
        run: >
          dotnet publish -c Release -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: NetScan ${{ github.ref_name }}
          body: |
            ## NetScan ${{ github.ref_name }}

            Self-contained single-file Windows executable — no installation required.

            ### Usage
            Download `NetScan.exe` and run it directly on Windows 10/11.
          files: publish/NetScan.exe
